<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>杭州段 · 游玩路线</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif; }
  #map { width: 100%; height: 100%; }

  .legend-panel {
    position: absolute;
    top: 16px;
    right: 16px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.10);
    padding: 14px 16px;
    min-width: 180px;
    z-index: 100;
    font-size: 13px;
    line-height: 1.7;
    color: #333;
    user-select: none;
  }
  .legend-panel .title {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #eee;
  }
  .legend-row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    gap: 8px;
  }
  .legend-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .legend-line {
    width: 22px;
    height: 3px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .legend-label {
    color: #555;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="map"></div>

<div class="legend-panel" id="legend">
  <div class="title">杭州段 · 游玩路线</div>
  <div class="legend-row"><span class="legend-dot" style="background:#4A90D9;">1</span><span class="legend-label">杭州东站（汇合）</span></div>
  <div class="legend-row"><span class="legend-dot" style="background:#4A90D9;">2</span><span class="legend-label">西溪印象城</span></div>
  <div class="legend-row"><span class="legend-line" style="background:#4A90D9;"></span><span class="legend-label" style="color:#999;">Day 1 路线</span></div>
  <div class="legend-row"><span class="legend-dot" style="background:#FFB020;">H</span><span class="legend-label">保俶路酒店</span></div>
  <div class="legend-row"><span class="legend-dot" style="background:#36B37E;">3</span><span class="legend-label">茅家埠</span></div>
  <div class="legend-row"><span class="legend-dot" style="background:#36B37E;">4</span><span class="legend-label">乌龟潭</span></div>
  <div class="legend-row"><span class="legend-dot" style="background:#36B37E;">5</span><span class="legend-label">浴鹄湾</span></div>
  <div class="legend-row"><span class="legend-line" style="background:#36B37E;"></span><span class="legend-label" style="color:#999;">Day 2 步行线</span></div>
  <div class="legend-row"><span class="legend-dot" style="background:#E06000;">6</span><span class="legend-label">义乌（一日游）</span></div>
  <div class="legend-row"><span class="legend-line" style="background:#E06000;"></span><span class="legend-label" style="color:#999;">Day 3 高铁往返</span></div>
</div>

<script src="https://webapi.amap.com/maps?v=2.0&key=f0f99d37a1379881c4d77d45d98b05a6&plugin=AMap.Marker,AMap.Polyline,AMap.InfoWindow,AMap.PolyEditor"></script>
<script>
(function() {
  var map = new AMap.Map('map', {
    zoom: 13,
    center: [120.16, 30.255],
    mapStyle: 'amap://styles/light',
    resizeEnable: true,
    features: ['bg', 'road', 'building']
  });

  map.setDefaultCursor('default');

  // Destination marker style (Gaode native dot marker)
  function createMarker(lng, lat, label, color, number) {
    var size = number === 'H' ? '24px' : '26px';
    var fontSize = number === 'H' ? '11px' : '12px';
    var content = '<div style="' +
      'background:' + color + ';' +
      'width:' + size + ';height:' + size + ';' +
      'border-radius:50%;' +
      'color:#fff;' +
      'text-align:center;' +
      'line-height:' + size + ';' +
      'font-size:' + fontSize + ';' +
      'font-weight:700;' +
      'box-shadow: 0 2px 6px rgba(0,0,0,0.25);' +
      'border: 2px solid #fff;' +
      'cursor:pointer;' +
    '">' + number + '</div>';

    var marker = new AMap.Marker({
      position: [lng, lat],
      content: content,
      offset: new AMap.Pixel(-13, -13),
      zIndex: 100,
      title: label
    });

    marker.on('click', function() {
      var info = new AMap.InfoWindow({
        content: '<div style="padding:4px 6px;font-size:13px;color:#333;">' + label + '</div>',
        offset: new AMap.Pixel(0, -32)
      });
      info.open(map, marker.getPosition());
    });

    return marker;
  }

  // Markers for each stop
  var markers = [
    createMarker(120.212600, 30.290851, '① 杭州东站 · 汇合点', '#4A90D9', '1'),
    createMarker(120.100416, 30.294071, '② 西溪印象城 · 水豚噜噜展', '#4A90D9', '2'),
    createMarker(120.147832, 30.266268, '酒店 · 保俶路/断桥附近', '#FFB020', 'H'),
    createMarker(120.130573, 30.240672, '③ 茅家埠', '#36B37E', '3'),
    createMarker(120.133476, 30.232185, '④ 乌龟潭', '#36B37E', '4'),
    createMarker(120.138026, 30.225345, '⑤ 浴鹄湾', '#36B37E', '5'),
    createMarker(120.075679, 29.306296, '⑥ 义乌 · 国际商贸城', '#E06000', '6'),
  ];

  map.add(markers);

  // Day 1 route (Blue): 杭州东站 → 西溪印象城 → 酒店
  var day1Line = new AMap.Polyline({
    path: [
      [120.212600, 30.290851],
      [120.100416, 30.294071],
      [120.147832, 30.266268]
    ],
    strokeColor: '#4A90D9',
    strokeWeight: 4,
    strokeOpacity: 0.7,
    strokeStyle: 'solid',
    lineJoin: 'round',
    lineCap: 'round',
    zIndex: 50,
    showDir: true
  });
  map.add(day1Line);

  // Day 2 route (Green): 酒店 → 茅家埠 → 乌龟潭 → 浴鹄湾 → 回酒店
  var day2Line = new AMap.Polyline({
    path: [
      [120.147832, 30.266268],
      [120.130573, 30.240672],
      [120.133476, 30.232185],
      [120.138026, 30.225345],
      [120.147832, 30.266268]
    ],
    strokeColor: '#36B37E',
    strokeWeight: 4,
    strokeOpacity: 0.7,
    strokeStyle: 'solid',
    lineJoin: 'round',
    lineCap: 'round',
    zIndex: 49,
    showDir: true
  });
  map.add(day2Line);

  // Day 3 route (Orange): 酒店 → 杭州东站 → 义乌
  var day3Line = new AMap.Polyline({
    path: [
      [120.147832, 30.266268],
      [120.212600, 30.290851],
      [120.075679, 29.306296]
    ],
    strokeColor: '#E06000',
    strokeWeight: 3,
    strokeOpacity: 0.6,
    strokeStyle: 'dashed',
    lineJoin: 'round',
    lineCap: 'round',
    zIndex: 48,
    showDir: true
  });
  map.add(day3Line);

  // Auto-fit bounds to show all markers
  map.setFitView(null, false, [60, 60, 300, 160]);

})();
</script>
</body>
</html>
